name = "edi-workers"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
# Credential expiration scan — daily at 08:00 UTC
# Pending user deletion check — daily at 04:00 UTC
# Expired-session cleanup — daily at 02:00 UTC
# Audit-log cleanup — 1st of each month at 03:00 UTC
crons = ["0 8 * * *", "0 4 * * *", "0 2 * * *", "0 3 1 * *"]

[vars]
AUDIT_LOG_RETENTION_DAYS = "90"
# Secrets — set via `wrangler secret put KEY` or .dev.vars:
#   DATABASE_URL
#   RESEND_API_KEY    (get free key at resend.com — optional, emails skipped if absent)
#   EMAIL_FROM        (e.g. "EDI <noreply@yourdomain.com>")
